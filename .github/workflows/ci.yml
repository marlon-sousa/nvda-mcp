name: CI

# Job names are SHORT and STABLE -- `shared`, `server`, `nvda-bridge` -- on
# purpose. Branch protection matches required status checks by this literal
# string, so a descriptive job name couples the merge gate to the job's
# *contents*: renaming it (e.g. when the bridge stopped needing an NVDA
# checkout) silently parks every PR on "Expected - waiting for status to be
# reported" until someone edits the repo settings to match. Keep the detail in
# STEP names, which are free to change. Do not "improve" these names.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shared:
    name: shared
    runs-on: windows-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Tests (wire contract)
        run: uv run --python 3.13 pytest -q
      - name: Pyright
        run: uv run --python 3.13 pyright
      # Drift gate: the published JSON Schema is generated from the dataclasses,
      # so regenerating it must leave the committed file byte-identical. If a
      # protocol change forgot to regenerate, git diff makes CI red.
      - name: Wire schema is up to date
        # bash on purpose: the Windows-runner default shell (PowerShell) re-encodes
        # redirected stdout (UTF-16 + BOM), which would corrupt the byte compare.
        shell: bash
        run: |
          uv run --python 3.13 python -m nvda_mcp_wire.schema > ../specs/wire/v1/schema.json
          git diff --exit-code -- ../specs/wire/v1/schema.json

  # Go since entry 10a (spec 0013). The JOB NAME is unchanged on purpose --
  # branch protection matches required checks by the literal name, so the
  # language change is invisible to the merge gate. The detail lives in the step
  # names, which are free to change.
  server:
    name: server
    runs-on: windows-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      # 1.25 since 10b: the official MCP Go SDK declares `go 1.25.0`, so the
      # module that depends on it must too. Nothing else asked for the bump.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      - name: Build
        run: go build ./...
      - name: Tests (unit)
        run: go test ./...
      # The headless and real-transport tiers: a fake bridge speaking real wire
      # frames over a real loopback socket and a real named pipe. Opt-in by tag
      # so the unit run above stays fast.
      - name: Tests (integration, real transports)
        run: go test -tags integration ./...
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      # Drift gate, mirroring the `shared` job's: the wire binding is GENERATED
      # from the published schema, so regenerating it must leave the committed
      # files byte-identical. This is what replaces the same-bytes guarantee the
      # two Python halves used to get for free.
      - name: Wire binding is up to date
        shell: bash
        run: |
          go generate ./adapters/wire
          git diff --exit-code -- adapters/wire
      # The named-pipe leaf must compile OUT cleanly: a non-Windows server host
      # is anticipated (a TalkBack or VoiceOver bridge), so this is a supported
      # configuration and not just CI hygiene.
      - name: Builds on Linux, without the pipe leaf
        run: go build ./...
        env:
          GOOS: linux

  # Cross-language conformance (entry 10c, spec 0013 deliverable 19). The one
  # job where BOTH implementations of specs/wire/v1/ are real: the Go server
  # (built, and driven over stdio like an MCP host would) against the real Python
  # bridge (headless, no NVDA), over a real named pipe AND real loopback TCP.
  #
  # WHY IT IS A SEPARATE JOB. Every test in the `server` job drives a Go fake
  # bridge that encodes with the same generated binding the server decodes with,
  # so a bug IN THE BINDING is invisible there -- both sides would be wrong
  # together, in agreement. This job is what replaced the same-bytes drift
  # guarantee the two halves had while both were Python, so a run that could not
  # reach the real bridge FAILS rather than skipping: the tests have no fall-back
  # path, and tests/architecture keeps anyone from adding one.
  #
  # NEW JOB NAME, therefore a new required-check decision: branch protection
  # matches required status checks by literal name, so adding this to
  # required_status_checks is a deliberate settings edit made AFTER the job has
  # reported once (ci.yml's header, and AGENTS.md's gotcha).
  conformance:
    name: conformance
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum
      # The bridge is stdlib-only, so a bare interpreter of the right version is
      # the whole requirement. The tests probe for one by running it and fail
      # loudly if there is none.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build the server
        working-directory: server
        run: go build ./...
      # -count=1 so a cached PASS can never stand in for a run that did not
      # actually reach the bridge.
      - name: Conformance against the real Python bridge (pipe and TCP)
        working-directory: server
        run: go test -tags conformance -count=1 -v ./tests/conformance/

  nvda-bridge:
    name: nvda-bridge
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bridges/nvda
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # The domain is pure (no NVDA); the NVDA edge is in pyright's ignore list,
      # so no NVDA source checkout or stubs are needed.
      - name: Sync shared wire module into addon
        run: python sync_shared.py
      - name: Tests (headless bridge core)
        run: uv run --python 3.13 --with pytest pytest -q
      - name: Pyright
        run: uv run --python 3.13 --with pyright --with pytest pyright
